<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Dramatics Test - Subfracture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    .spacer {
      height: 150vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0.3;
    }

    .sf-closer {
      background: #000000;
      color: #ffffff;
      position: sticky;
      bottom: 0;
      z-index: -1;
      height: 520px;
    }

    .sf-closer__top {
      position: sticky;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      align-content: space-between;
      padding: 3rem;
      background: #000000;
      z-index: 2;
      height: 520px;
      overflow: hidden;
    }

    .sf-closer__offices {
      display: flex;
      gap: 4rem;
    }

    .sf-closer__offices .office h4 {
      margin-bottom: 0.5em;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      font-weight: 500;
    }

    .sf-closer__offices .office p {
      opacity: 0.7;
      margin-bottom: 0.5em;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .sf-closer__mark {
      justify-self: end;
      align-self: start;
      opacity: 0.8;
    }

    .sf-closer__mark img {
      height: 40px;
      width: auto;
    }

    .sf-closer__tagline {
      grid-column: 1 / -1;
      font-size: 0.9rem;
      opacity: 0.5;
      margin-top: 2rem;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    .sf-closer__bigtype {
      grid-column: 1 / -1;
      line-height: 0.85;
      letter-spacing: -0.02em;
      font-weight: 800;
      font-size: clamp(3rem, 14vw, 16rem);
      bottom: -0.3em;
      position: relative;
      filter: invert(1);
      opacity: 0.95;
      perspective: 1000px;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .sf-closer__bigtype img {
      width: 70%;
      max-width: 1000px;
      display: block;
    }

    /* SVG letter animation support */
    .sf-closer__bigtype svg {
      width: 70%;
      max-width: 1000px;
      height: auto;
      display: block;
    }

    .sf-closer__bigtype svg path,
    .sf-closer__bigtype svg g > * {
      transform-origin: center center;
      will-change: transform, opacity;
    }

    /* Test controls */
    .test-controls {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 0.875rem;
      z-index: 9999;
    }

    .test-controls h3 {
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      opacity: 0.7;
    }

    .test-controls button {
      background: rgba(125, 84, 255, 0.2);
      border: 1px solid rgba(125, 84, 255, 0.5);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      margin: 0.25rem;
      font-size: 0.75rem;
    }

    .test-controls button:hover {
      background: rgba(125, 84, 255, 0.4);
    }

    .status {
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.75rem;
      opacity: 0.6;
    }

    @media (prefers-reduced-motion: reduce) {
      .sf-closer__bigtype {
        perspective: none;
        transform-style: flat;
        animation: none !important;
      }

      .sf-closer__bigtype svg path,
      .sf-closer__bigtype svg g > * {
        will-change: auto;
      }
    }
  </style>
</head>
<body>

  <div class="test-controls">
    <h3>Test Controls</h3>
    <button onclick="scrollToFooter()">Scroll to Footer</button>
    <button onclick="resetAnimation()">Reset Animation</button>
    <button onclick="toggleReducedMotion()">Toggle Reduced Motion</button>
    <div class="status">
      <div>Scroll to footer to trigger animation</div>
      <div id="motion-status">Motion: Normal</div>
    </div>
  </div>

  <div class="spacer">
    <div>
      ↓ Scroll down to see footer dramatics ↓
    </div>
  </div>

  <section class="sf-closer" role="contentinfo" aria-label="Subfracture Culture Studio">
    <div class="sf-closer__top">
      <div class="sf-closer__offices">
        <div class="office">
          <h4>Brisbane</h4>
          <p>29 Merivale Street<br>South Brisbane, Qld 4101</p>
          <p><a href="mailto:ohhello@subfrac.com">ohhello@subfrac.com</a></p>
        </div>
        <div class="office">
          <h4>Los Angeles</h4>
          <p>520 Broadway Suite 200<br>Santa Monica, CA 90401</p>
        </div>
      </div>
      <div class="sf-closer__mark">
        <img src="https://subfrac.com/wp-content/themes/mkrst-child/assets/media/sf-logo.svg" alt="Subfracture Logomark">
      </div>
      <div class="sf-closer__tagline">A culture studio. Art and systems, flowing together.</div>
      <div class="sf-closer__bigtype">
        <!--
          For this test, we'll use the IMG version
          For full letter-by-letter animation, replace with inline SVG
        -->
        <img src="https://subfrac.com/wp-content/themes/mkrst-child/assets/media/subfracture.svg" alt="Subfracture Logo">
      </div>
    </div>
  </section>

  <!-- Load GSAP from CDN for testing -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

  <script type="module">
    // For testing, inline a simplified version of the footer dramatics
    gsap.registerPlugin(ScrollTrigger);

    const prefersReducedMotion = () =>
      window.matchMedia?.('(prefers-reduced-motion: reduce)').matches;

    function initFooterDramatics() {
      const bigtype = document.querySelector('.sf-closer__bigtype');
      if (!bigtype) return;

      const img = bigtype.querySelector('img');
      if (!img) return;

      console.log('🎭 Footer Dramatics Test - Initializing...');

      // Simplified version for testing
      if (prefersReducedMotion()) {
        gsap.fromTo(bigtype,
          { autoAlpha: 0 },
          {
            autoAlpha: 1,
            duration: 0.8,
            ease: 'power2.out',
            scrollTrigger: {
              trigger: bigtype,
              start: 'top 85%',
              toggleActions: 'play none none reverse'
            }
          }
        );
        console.log('✓ Reduced motion mode - simple fade');
        return;
      }

      // Full animation
      gsap.set(img, {
        y: 120,
        rotation: 8,
        opacity: 0,
        transformOrigin: 'center center',
        force3D: true
      });

      ScrollTrigger.create({
        trigger: bigtype,
        start: 'top 85%',
        once: true,
        onEnter: () => {
          console.log('✓ Animation triggered!');

          const tl = gsap.timeline({
            defaults: {
              ease: 'back.out(1.4)',
              duration: 1.2
            }
          });

          // Rise
          tl.to(img, {
            y: 0,
            rotation: 0,
            opacity: 1
          })
          // Overshoot
          .to(img, {
            y: -5,
            duration: 0.3,
            ease: 'power1.out'
          }, '-=0.6')
          // Settle
          .to(img, {
            y: 0,
            duration: 0.4,
            ease: 'power2.out'
          }, '-=0.1')
          // Activate parallax
          .call(() => {
            initMouseParallax(bigtype, img);
          });
        }
      });

      console.log('✓ Footer dramatics initialized');
    }

    function initMouseParallax(container, element) {
      let mouseX = 0, mouseY = 0;
      let currentX = 0, currentY = 0;

      const ease = 0.08;
      const depth = 8;

      document.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        mouseX = (e.clientX - centerX) / (rect.width / 2);
        mouseY = (e.clientY - centerY) / (rect.height / 2);
      }, { passive: true });

      function animate() {
        currentX += (mouseX - currentX) * ease;
        currentY += (mouseY - currentY) * ease;

        gsap.set(element, {
          x: currentX * depth,
          y: currentY * depth,
          rotation: currentX * 1.5,
          force3D: true
        });

        requestAnimationFrame(animate);
      }

      animate();
      console.log('✓ Mouse parallax activated');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', initFooterDramatics);

    // Test controls
    window.scrollToFooter = () => {
      document.querySelector('.sf-closer').scrollIntoView({ behavior: 'smooth' });
    };

    window.resetAnimation = () => {
      location.reload();
    };

    window.toggleReducedMotion = () => {
      // Toggle via CSS (simplified for testing)
      document.body.classList.toggle('reduced-motion');
      const status = document.querySelector('#motion-status');
      status.textContent = document.body.classList.contains('reduced-motion')
        ? 'Motion: Reduced (reload to apply)'
        : 'Motion: Normal';
    };
  </script>

  <style>
    body.reduced-motion .sf-closer__bigtype {
      perspective: none !important;
      transform-style: flat !important;
    }
  </style>

</body>
</html>
