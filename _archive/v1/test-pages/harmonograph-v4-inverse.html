<!DOCTYPE html>
<html>
<head>
  <title>Subfracture // Inverse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      overflow: hidden;
      cursor: crosshair;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Logo mask overlay - cuts through the harmonograph */
    #mask-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      pointer-events: none;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.15);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      z-index: 100;
      transition: opacity 1s ease;
    }

    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div class="canvas-container">
    <canvas id="canvas"></canvas>
    <canvas id="mask-canvas"></canvas>
  </div>

  <div class="hint" id="hint">click to regenerate</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const maskCanvas = document.getElementById('mask-canvas');
    const maskCtx = maskCanvas.getContext('2d');

    let width, height;

    // Load logo
    const logoImg = new Image();
    logoImg.src = 'assets/subfracture-wordmark.png';

    let logoX, logoY, logoW, logoH;

    function resize() {
      width = canvas.width = maskCanvas.width = window.innerWidth;
      height = canvas.height = maskCanvas.height = window.innerHeight;
      drawMask();
    }

    function drawMask() {
      if (!logoImg.complete) return;

      // Clear mask to fully transparent
      maskCtx.clearRect(0, 0, width, height);

      // Calculate logo dimensions
      logoW = Math.min(width * 0.6, 750);
      logoH = logoW * (logoImg.height / logoImg.width);
      logoX = (width - logoW) / 2;
      logoY = (height - logoH) / 2;

      // Draw logo as solid dark shape ON TOP of harmonograph
      // This creates the "carved out" effect - letters are voids
      maskCtx.fillStyle = '#050510';
      maskCtx.drawImage(logoImg, logoX, logoY, logoW, logoH);

      // Use the logo as a mask to fill with background color
      maskCtx.globalCompositeOperation = 'source-in';
      maskCtx.fillRect(0, 0, width, height);
      maskCtx.globalCompositeOperation = 'source-over';
    }

    logoImg.onload = () => {
      resize();
      randomize();
      animate();
    };

    window.addEventListener('resize', () => {
      resize();
      // Redraw current state
      drawMask();
    });

    const state = {
      pendulums: [],
      t: 0,
      dt: 0.02,
      pointsPerFrame: 60,
      maxT: 1800,
      isDrawing: true,
      hue: 190,
      centerX: 0,
      centerY: 0,
      scale: 1
    };

    let lastPoint = null;
    let hasInteracted = false;

    function harmonographPoint(t) {
      const p = state.pendulums;
      const x = p[0].A * Math.exp(-p[0].d * t) * Math.sin(p[0].f * t + p[0].p) +
                p[1].A * Math.exp(-p[1].d * t) * Math.sin(p[1].f * t + p[1].p);
      const y = p[2].A * Math.exp(-p[2].d * t) * Math.sin(p[2].f * t + p[2].p) +
                p[3].A * Math.exp(-p[3].d * t) * Math.sin(p[3].f * t + p[3].p);
      return {
        x: state.centerX + x * state.scale,
        y: state.centerY + y * state.scale
      };
    }

    function drawSegment(from, to, t) {
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);

      const progress = t / state.maxT;
      const hue = (state.hue + progress * 50) % 360;
      const opacity = 0.18 - progress * 0.06;

      ctx.strokeStyle = `hsla(${hue}, 65%, 55%, ${Math.max(0.05, opacity)})`;
      ctx.lineWidth = 0.9;
      ctx.stroke();
    }

    function animate() {
      if (state.isDrawing) {
        for (let i = 0; i < state.pointsPerFrame; i++) {
          if (state.t > state.maxT) {
            state.isDrawing = false;
            break;
          }
          const currentPoint = harmonographPoint(state.t);
          if (lastPoint) {
            drawSegment(lastPoint, currentPoint, state.t);
          }
          lastPoint = currentPoint;
          state.t += state.dt;
        }
      }
      requestAnimationFrame(animate);
    }

    function randomize() {
      // Clear harmonograph canvas (not the mask)
      ctx.fillStyle = '#050510';
      ctx.fillRect(0, 0, width, height);

      state.t = 0;
      state.isDrawing = true;
      lastPoint = null;
      state.centerX = width / 2;
      state.centerY = height / 2;

      const ratios = [[2, 1], [3, 2], [4, 3], [5, 4], [7, 4], [5, 3], [8, 5], [7, 5]];
      const ratio = ratios[Math.floor(Math.random() * ratios.length)];
      const baseFreq = 1.5 + Math.random() * 2.5;
      const detune = () => 0.99 + Math.random() * 0.02;

      // Scale to fill more of the canvas
      const s = 1.3;

      state.pendulums = [
        { A: (180 + Math.random() * 100) * s, f: baseFreq * ratio[0] * detune(), d: 0.001 + Math.random() * 0.0015, p: Math.random() * Math.PI * 2 },
        { A: (60 + Math.random() * 80) * s, f: baseFreq * ratio[1] * detune() * 0.5, d: 0.0008 + Math.random() * 0.001, p: Math.random() * Math.PI * 2 },
        { A: (180 + Math.random() * 100) * s, f: baseFreq * ratio[1] * detune(), d: 0.001 + Math.random() * 0.0015, p: Math.random() * Math.PI * 2 },
        { A: (60 + Math.random() * 80) * s, f: baseFreq * ratio[0] * detune() * 0.5, d: 0.0008 + Math.random() * 0.001, p: Math.random() * Math.PI * 2 }
      ];

      state.hue = 175 + Math.random() * 50;

      if (!hasInteracted) {
        hasInteracted = true;
        document.getElementById('hint').classList.add('hidden');
      }
    }

    canvas.addEventListener('click', randomize);
    maskCanvas.addEventListener('click', randomize);

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'KeyR') {
        e.preventDefault();
        randomize();
      }
    });

    state.centerX = window.innerWidth / 2;
    state.centerY = window.innerHeight / 2;
  </script>
</body>
</html>
