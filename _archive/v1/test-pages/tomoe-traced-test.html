<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomoe Traced Animation Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0014;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    #tomoe-container {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(125, 84, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(125, 84, 255, 0.1);
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    button {
      padding: 0.75rem 2rem;
      background: #7d54ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #6a43e6;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .info {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .info strong {
      color: #7d54ff;
      display: block;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .reference {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .reference img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      opacity: 0.8;
    }

    .reference p {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="tomoe-container"></div>

    <div class="controls">
      <button id="animate-btn">Animate</button>
      <button id="reset-btn">Reset</button>
    </div>

    <div class="info">
      <strong>Properly Traced Tomoe</strong>
      This animation traces the actual hand-drawn curves from IMG_0156.jpg.
      <br>
      No generic paths. No fake wobble. Just your drawing coming to life.
    </div>

    <div class="reference">
      <img src="/assets/drawings/IMG_0156.jpg" alt="Original Tomoe Drawing">
      <p>Original hand-drawn Tomoe reference</p>
    </div>
  </div>

  <script type="module">
    import { TomoeTraced } from '/assets/js/tomoe-traced.js';

    const container = document.getElementById('tomoe-container');
    const animateBtn = document.getElementById('animate-btn');
    const resetBtn = document.getElementById('reset-btn');

    // Initialize the traced Tomoe
    const tomoe = new TomoeTraced(container);

    // Auto-play on load
    setTimeout(() => {
      tomoe.animate();
    }, 500);

    // Controls
    animateBtn.addEventListener('click', () => {
      if (!tomoe.isAnimating) {
        tomoe.animate();
      }
    });

    resetBtn.addEventListener('click', () => {
      tomoe.reset();
    });

    // Update button state based on animation
    setInterval(() => {
      animateBtn.disabled = tomoe.isAnimating;
    }, 100);
  </script>
</body>
</html>
