<!DOCTYPE html>
<html>
<head>
  <title>Subfracture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      overflow: hidden;
      cursor: crosshair;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Logo layer - ghosted substrate */
    .logo-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.12;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
      filter: blur(0.5px);
    }

    .logo-layer img {
      width: 60vw;
      max-width: 800px;
      height: auto;
    }

    /* Harmonograph canvas */
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
    }

    /* Minimal hint - fades after interaction */
    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.2);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      z-index: 100;
      transition: opacity 1s ease;
    }

    .hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="canvas-container">
    <!-- Logo substrate -->
    <div class="logo-layer">
      <img src="assets/subfracture-wordmark.png" alt="">
    </div>

    <!-- Harmonograph drawing surface -->
    <canvas id="canvas"></canvas>
  </div>

  <div class="hint" id="hint">click anywhere</div>

  <script>
    // ===== CANVAS SETUP =====
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ===== STATE =====
    const state = {
      pendulums: [
        { A: 200, f: 3.01,  d: 0.002, p: 0 },
        { A: 50,  f: 1.5,   d: 0.001, p: Math.PI/4 },
        { A: 200, f: 2.0,   d: 0.002, p: Math.PI/2 },
        { A: 50,  f: 1.5,   d: 0.001, p: 0 }
      ],
      t: 0,
      dt: 0.02,
      pointsPerFrame: 40,
      maxT: 1200,
      isDrawing: true,
      hue: 190, // Subfracture cyan-ish
      centerX: 0,
      centerY: 0,
      scale: 1
    };

    let lastPoint = null;
    let hasInteracted = false;

    // ===== CORE MATH =====
    function harmonographPoint(t) {
      const p = state.pendulums;

      const x = p[0].A * Math.exp(-p[0].d * t) * Math.sin(p[0].f * t + p[0].p) +
                p[1].A * Math.exp(-p[1].d * t) * Math.sin(p[1].f * t + p[1].p);

      const y = p[2].A * Math.exp(-p[2].d * t) * Math.sin(p[2].f * t + p[2].p) +
                p[3].A * Math.exp(-p[3].d * t) * Math.sin(p[3].f * t + p[3].p);

      return {
        x: state.centerX + x * state.scale,
        y: state.centerY + y * state.scale
      };
    }

    // ===== DRAWING =====
    function drawSegment(from, to, t) {
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);

      // Subtle color shift over time
      const progress = t / state.maxT;
      const hue = (state.hue + progress * 40) % 360;
      const opacity = 0.15 - progress * 0.05; // Fade as it draws

      ctx.strokeStyle = `hsla(${hue}, 60%, 55%, ${Math.max(0.05, opacity)})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    // ===== ANIMATION =====
    function animate() {
      if (state.isDrawing) {
        for (let i = 0; i < state.pointsPerFrame; i++) {
          if (state.t > state.maxT) {
            state.isDrawing = false;
            break;
          }

          const currentPoint = harmonographPoint(state.t);

          if (lastPoint) {
            drawSegment(lastPoint, currentPoint, state.t);
          }

          lastPoint = currentPoint;
          state.t += state.dt;
        }
      }

      requestAnimationFrame(animate);
    }

    // ===== RANDOMIZE =====
    function randomize() {
      // Clear canvas
      ctx.clearRect(0, 0, width, height);

      // Reset state
      state.t = 0;
      state.isDrawing = true;
      lastPoint = null;

      // Recenter
      state.centerX = width / 2;
      state.centerY = height / 2;

      // Random frequency ratios for beauty
      const ratios = [
        [2, 1], [3, 2], [4, 3], [5, 3], [5, 4],
        [7, 4], [8, 5], [3, 1], [7, 6], [9, 8]
      ];
      const ratio = ratios[Math.floor(Math.random() * ratios.length)];

      const baseFreq = 1.5 + Math.random() * 2.5;
      const detune = () => 0.99 + Math.random() * 0.02;

      state.pendulums = [
        {
          A: 140 + Math.random() * 80,
          f: baseFreq * ratio[0] * detune(),
          d: 0.0015 + Math.random() * 0.002,
          p: Math.random() * Math.PI * 2
        },
        {
          A: 30 + Math.random() * 60,
          f: baseFreq * ratio[1] * detune() * 0.5,
          d: 0.001 + Math.random() * 0.0015,
          p: Math.random() * Math.PI * 2
        },
        {
          A: 140 + Math.random() * 80,
          f: baseFreq * ratio[1] * detune(),
          d: 0.0015 + Math.random() * 0.002,
          p: Math.random() * Math.PI * 2
        },
        {
          A: 30 + Math.random() * 60,
          f: baseFreq * ratio[0] * detune() * 0.5,
          d: 0.001 + Math.random() * 0.0015,
          p: Math.random() * Math.PI * 2
        }
      ];

      // Shift hue slightly each randomization
      state.hue = 170 + Math.random() * 50; // Stay in cyan-blue range

      // Hide hint after first interaction
      if (!hasInteracted) {
        hasInteracted = true;
        document.getElementById('hint').classList.add('hidden');
      }
    }

    // ===== INTERACTION =====
    canvas.addEventListener('click', randomize);

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'KeyR') {
        e.preventDefault();
        randomize();
      }
    });

    // ===== INIT =====
    state.centerX = width / 2;
    state.centerY = height / 2;
    animate();
  </script>
</body>
</html>
