<!DOCTYPE html>
<html>
<head>
  <title>Subfracture // Visible</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      overflow: hidden;
      cursor: crosshair;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Logo layer - MORE VISIBLE, multiply blend */
    .logo-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    .logo-layer img {
      width: 55vw;
      max-width: 700px;
      height: auto;
      filter: invert(1); /* White logo becomes dark for multiply */
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      mix-blend-mode: screen;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.15);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      z-index: 100;
      transition: opacity 1s ease;
    }

    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div class="canvas-container">
    <div class="logo-layer">
      <img src="assets/subfracture-wordmark.png" alt="">
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div class="hint" id="hint">click to regenerate</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const state = {
      pendulums: [],
      t: 0,
      dt: 0.02,
      pointsPerFrame: 50,
      maxT: 1000,
      isDrawing: true,
      hue: 200,
      centerX: 0,
      centerY: 0,
      scale: 1
    };

    let lastPoint = null;
    let hasInteracted = false;

    function harmonographPoint(t) {
      const p = state.pendulums;
      const x = p[0].A * Math.exp(-p[0].d * t) * Math.sin(p[0].f * t + p[0].p) +
                p[1].A * Math.exp(-p[1].d * t) * Math.sin(p[1].f * t + p[1].p);
      const y = p[2].A * Math.exp(-p[2].d * t) * Math.sin(p[2].f * t + p[2].p) +
                p[3].A * Math.exp(-p[3].d * t) * Math.sin(p[3].f * t + p[3].p);
      return {
        x: state.centerX + x * state.scale,
        y: state.centerY + y * state.scale
      };
    }

    function drawSegment(from, to, t) {
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);

      const progress = t / state.maxT;
      const hue = (state.hue + progress * 60) % 360;
      // Brighter lines to show through blend
      ctx.strokeStyle = `hsla(${hue}, 70%, 65%, 0.25)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function animate() {
      if (state.isDrawing) {
        for (let i = 0; i < state.pointsPerFrame; i++) {
          if (state.t > state.maxT) {
            state.isDrawing = false;
            break;
          }
          const currentPoint = harmonographPoint(state.t);
          if (lastPoint) {
            drawSegment(lastPoint, currentPoint, state.t);
          }
          lastPoint = currentPoint;
          state.t += state.dt;
        }
      }
      requestAnimationFrame(animate);
    }

    function randomize() {
      ctx.clearRect(0, 0, width, height);
      state.t = 0;
      state.isDrawing = true;
      lastPoint = null;
      state.centerX = width / 2;
      state.centerY = height / 2;

      const ratios = [[2, 1], [3, 2], [4, 3], [5, 4], [7, 4], [5, 3]];
      const ratio = ratios[Math.floor(Math.random() * ratios.length)];
      const baseFreq = 2 + Math.random() * 2;
      const detune = () => 0.99 + Math.random() * 0.02;

      state.pendulums = [
        { A: 150 + Math.random() * 70, f: baseFreq * ratio[0] * detune(), d: 0.002 + Math.random() * 0.002, p: Math.random() * Math.PI * 2 },
        { A: 40 + Math.random() * 50, f: baseFreq * ratio[1] * detune() * 0.5, d: 0.001 + Math.random() * 0.001, p: Math.random() * Math.PI * 2 },
        { A: 150 + Math.random() * 70, f: baseFreq * ratio[1] * detune(), d: 0.002 + Math.random() * 0.002, p: Math.random() * Math.PI * 2 },
        { A: 40 + Math.random() * 50, f: baseFreq * ratio[0] * detune() * 0.5, d: 0.001 + Math.random() * 0.001, p: Math.random() * Math.PI * 2 }
      ];

      state.hue = 180 + Math.random() * 60;

      if (!hasInteracted) {
        hasInteracted = true;
        document.getElementById('hint').classList.add('hidden');
      }
    }

    canvas.addEventListener('click', randomize);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'KeyR') {
        e.preventDefault();
        randomize();
      }
    });

    state.centerX = width / 2;
    state.centerY = height / 2;
    randomize();
    animate();
  </script>
</body>
</html>
