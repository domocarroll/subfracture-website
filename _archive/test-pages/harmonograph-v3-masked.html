<!DOCTYPE html>
<html>
<head>
  <title>Subfracture // Masked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      overflow: hidden;
      cursor: crosshair;
    }

    .canvas-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Logo used as mask - harmonograph only visible inside letters */
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.15);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      z-index: 100;
      transition: opacity 1s ease;
    }

    .hint.hidden { opacity: 0; }

    /* Subtle outline hint of where logo is */
    .logo-outline {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.05;
      pointer-events: none;
      z-index: 1;
    }

    .logo-outline img {
      width: 55vw;
      max-width: 700px;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="canvas-container">
    <div class="logo-outline">
      <img src="assets/subfracture-wordmark.png" alt="">
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div class="hint" id="hint">click to regenerate</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    // Load logo as mask
    const logoImg = new Image();
    logoImg.src = 'assets/subfracture-wordmark.png';

    let maskCanvas, maskCtx, maskData;
    let logoX, logoY, logoW, logoH;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      setupMask();
    }

    function setupMask() {
      if (!logoImg.complete) return;

      // Calculate logo dimensions (55vw, max 700px)
      logoW = Math.min(width * 0.55, 700);
      logoH = logoW * (logoImg.height / logoImg.width);
      logoX = (width - logoW) / 2;
      logoY = (height - logoH) / 2;

      // Create mask canvas
      maskCanvas = document.createElement('canvas');
      maskCanvas.width = width;
      maskCanvas.height = height;
      maskCtx = maskCanvas.getContext('2d');

      // Draw logo to mask
      maskCtx.drawImage(logoImg, logoX, logoY, logoW, logoH);

      // Get pixel data for hit testing
      maskData = maskCtx.getImageData(0, 0, width, height).data;
    }

    logoImg.onload = () => {
      resize();
      randomize();
      animate();
    };

    window.addEventListener('resize', resize);

    const state = {
      pendulums: [],
      t: 0,
      dt: 0.02,
      pointsPerFrame: 60,
      maxT: 1500,
      isDrawing: true,
      hue: 190,
      centerX: 0,
      centerY: 0,
      scale: 1
    };

    let lastPoint = null;
    let hasInteracted = false;

    function isInsideMask(x, y) {
      if (!maskData) return true;
      const px = Math.floor(x);
      const py = Math.floor(y);
      if (px < 0 || px >= width || py < 0 || py >= height) return false;
      const idx = (py * width + px) * 4;
      // Check alpha channel - visible if alpha > 128
      return maskData[idx + 3] > 128;
    }

    function harmonographPoint(t) {
      const p = state.pendulums;
      const x = p[0].A * Math.exp(-p[0].d * t) * Math.sin(p[0].f * t + p[0].p) +
                p[1].A * Math.exp(-p[1].d * t) * Math.sin(p[1].f * t + p[1].p);
      const y = p[2].A * Math.exp(-p[2].d * t) * Math.sin(p[2].f * t + p[2].p) +
                p[3].A * Math.exp(-p[3].d * t) * Math.sin(p[3].f * t + p[3].p);
      return {
        x: state.centerX + x * state.scale,
        y: state.centerY + y * state.scale
      };
    }

    function drawSegment(from, to, t) {
      // Only draw if both points are inside the mask
      const fromInside = isInsideMask(from.x, from.y);
      const toInside = isInsideMask(to.x, to.y);

      if (!fromInside && !toInside) return;

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);

      const progress = t / state.maxT;
      const hue = (state.hue + progress * 50) % 360;
      // Higher opacity since we're constrained to letters
      const opacity = fromInside && toInside ? 0.3 : 0.1;

      ctx.strokeStyle = `hsla(${hue}, 65%, 60%, ${opacity})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    function animate() {
      if (state.isDrawing) {
        for (let i = 0; i < state.pointsPerFrame; i++) {
          if (state.t > state.maxT) {
            state.isDrawing = false;
            break;
          }
          const currentPoint = harmonographPoint(state.t);
          if (lastPoint) {
            drawSegment(lastPoint, currentPoint, state.t);
          }
          lastPoint = currentPoint;
          state.t += state.dt;
        }
      }
      requestAnimationFrame(animate);
    }

    function randomize() {
      ctx.clearRect(0, 0, width, height);
      state.t = 0;
      state.isDrawing = true;
      lastPoint = null;
      state.centerX = width / 2;
      state.centerY = height / 2;

      const ratios = [[2, 1], [3, 2], [4, 3], [5, 4], [7, 4], [5, 3], [8, 5]];
      const ratio = ratios[Math.floor(Math.random() * ratios.length)];
      const baseFreq = 2 + Math.random() * 3;
      const detune = () => 0.99 + Math.random() * 0.02;

      // Slightly larger scale to fill letters better
      const s = 1.1;

      state.pendulums = [
        { A: (160 + Math.random() * 80) * s, f: baseFreq * ratio[0] * detune(), d: 0.0012 + Math.random() * 0.002, p: Math.random() * Math.PI * 2 },
        { A: (50 + Math.random() * 60) * s, f: baseFreq * ratio[1] * detune() * 0.5, d: 0.001 + Math.random() * 0.001, p: Math.random() * Math.PI * 2 },
        { A: (160 + Math.random() * 80) * s, f: baseFreq * ratio[1] * detune(), d: 0.0012 + Math.random() * 0.002, p: Math.random() * Math.PI * 2 },
        { A: (50 + Math.random() * 60) * s, f: baseFreq * ratio[0] * detune() * 0.5, d: 0.001 + Math.random() * 0.001, p: Math.random() * Math.PI * 2 }
      ];

      state.hue = 175 + Math.random() * 55;

      if (!hasInteracted) {
        hasInteracted = true;
        document.getElementById('hint').classList.add('hidden');
      }
    }

    canvas.addEventListener('click', randomize);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'KeyR') {
        e.preventDefault();
        randomize();
      }
    });

    state.centerX = width / 2;
    state.centerY = height / 2;
  </script>
</body>
</html>
