<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagua Self-Drawing Animation | Subfracture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #0a0014;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    #bagua-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title {
      position: absolute;
      top: 40px;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7d54ff;
      opacity: 0;
      animation: fadeIn 1s ease-out 5s forwards;
    }

    .subtitle {
      position: absolute;
      bottom: 40px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.4);
      opacity: 0;
      animation: fadeIn 1s ease-out 5.5s forwards;
    }

    .controls {
      position: absolute;
      bottom: 100px;
      display: flex;
      gap: 20px;
      opacity: 0;
      animation: fadeIn 1s ease-out 6s forwards;
    }

    button {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid #7d54ff;
      color: #7d54ff;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #7d54ff;
      color: #0a0014;
    }

    button:active {
      transform: scale(0.95);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Subtle vignette */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        rgba(10, 0, 20, 0.3) 70%,
        rgba(10, 0, 20, 0.8) 100%
      );
      pointer-events: none;
    }

    .completion-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #7d54ff;
      opacity: 0;
      pointer-events: none;
      text-align: center;
      line-height: 1.6;
    }

    .completion-message.show {
      animation: messageAppear 2s ease-out forwards;
    }

    @keyframes messageAppear {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.9);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      80% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.9);
      }
    }
  </style>
</head>
<body>
  <div class="title">八卦 Bagua</div>

  <div id="bagua-container"></div>

  <div class="subtitle">Art and Systems, Flowing Together</div>

  <div class="controls">
    <button id="replay-btn">Replay</button>
    <button id="reset-btn">Reset</button>
  </div>

  <div id="completion-message" class="completion-message">
    Balance achieved
  </div>

  <script type="module">
    import { init } from './assets/js/bagua-draw.js';
    import gsap from 'gsap';

    // Make GSAP globally available for the module
    window.gsap = gsap;

    // Initialize the Bagua drawing
    const bagua = init('#bagua-container', {
      size: 500,
      strokeColor: '#7d54ff',
      strokeWidth: 2.5,
      autoStart: true,
      enableRotation: true,
      onComplete: () => {
        // Show completion message
        const message = document.getElementById('completion-message');
        message.classList.add('show');

        // Remove the class after animation completes
        setTimeout(() => {
          message.classList.remove('show');
        }, 2000);
      }
    });

    // Control buttons
    document.getElementById('replay-btn').addEventListener('click', () => {
      bagua.replay();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      bagua.reset();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        bagua.replay();
      }
      if (e.key === ' ') {
        e.preventDefault();
        bagua.reset();
      }
    });

    // Log to console
    console.log('%c八卦 BAGUA', 'font-size: 24px; color: #7d54ff; font-weight: bold;');
    console.log('%cThe eight trigrams draw themselves...', 'font-size: 14px; color: #7d54ff;');
    console.log('%c\nControls:', 'font-size: 12px; color: #fff; font-weight: bold;');
    console.log('%c- Press R to replay', 'font-size: 12px; color: rgba(255,255,255,0.7);');
    console.log('%c- Press SPACE to reset', 'font-size: 12px; color: rgba(255,255,255,0.7);');
  </script>
</body>
</html>
